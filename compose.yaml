services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: rec
      POSTGRES_PASSWORD: rec
      POSTGRES_DB: rec
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rec -d rec"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  pgdata:
